name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel stale runs on the same ref; let PR and push runs coexist.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc --noEmit)
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f dist/index.html
          test -n "$(ls dist/assets/*.js 2>/dev/null)"
          test -n "$(ls dist/assets/*.css 2>/dev/null)"
          echo "Build sanity checks passed"
