name: Deploy to GitHub Pages

# Deploy only AFTER the CI workflow has finished successfully on master, so a
# lint / type-check / build failure can never publish a broken site. CI remains
# the single source of truth for "is this commit green".
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  # Allow explicit manual redeploys from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # `workflow_run` fires `completed` for BOTH success and failure, so this
  # condition is what actually enforces "green before deploy". Manual dispatch
  # is allowed through unconditionally (it's an intentional human action).
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      # Check out the exact commit CI validated (head_sha of the CI run), so we
      # never build/deploy a different SHA than the one that passed checks.
      - name: Checkout validated commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
